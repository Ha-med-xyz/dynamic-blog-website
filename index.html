<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1 class="blog-title">Welcome to the blog</h1>
    <a href="new-post.html">New Post</a>

    <div id="posts"></div>


    <script>
        function getPosts() {

            const postsContent = localStorage.getItem("posts");
            const posts = postsContent ? JSON.parse(postsContent) : [];

            const postsContainer = document.getElementById("posts");

            if (posts.length === 0) {
                postsContainer.innerHTML = "<p>No posts yet. Create one!"
                return;
            }

            posts.forEach((post, index) => {
                const postElement = document.createElement("div");
                postElement.classList.add("post-card");

                postElement.innerHTML = `
                    ${post.image ? `<img src="${post.image}" alt="${post.title}" />` : ""}
                    <h2>${post.title}</h2>
                    <p>${post.content}</p>
                    <a href="post.html?id=${index}">Read & Edit →</a>
                `;
                postsContainer.appendChild(postElement);
            });
        }
        getPosts();
    </script>
</body>

</html>
